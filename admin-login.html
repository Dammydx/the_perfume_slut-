<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - The Perfume Slut</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
    <div class="login-container">
        <a href="index.html" class="back-link">← Back to Shop</a>
        <div class="login-header">
            <img src="logo2.PNG" alt="The Perfume Slut Logo" class="login-logo">
            <h2>Admin Portal</h2>
            <p>Enter your master password to continue.</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required placeholder="Enter your password">
                    <i class='bx bx-hide' id="togglePassword"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            <p id="errorMessage" class="form-message error" style="display: none;"></p>
        </form>
        
        <div class="security-warning">
            <i class='bx bx-shield-quarter'></i>
            <p><strong>Restricted Area:</strong> Unauthorized access is strictly prohibited and logged.</p>
        </div>
    </div>

    <script type="module" src="js/admin-login.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // Toggle the eye icon class
            this.classList.toggle('bx-hide');
            this.classList.toggle('bx-show');
        });
    </script>
</body>
</html>
