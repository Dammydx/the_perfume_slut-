<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <img src="logo2.PNG" alt="The Perfume Slut Logo" class="sidebar-logo">
            </div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-item">
                    <i class='bx bxs-dashboard'></i> <span class="nav-item-text">Dashboard</span>
                </a>
                <a href="admin-categories.html" class="nav-item">
                    <i class='bx bxs-folder'></i> <span class="nav-item-text">Categories</span>
                </a>
                <a href="admin-products.html" class="nav-item">
                    <i class='bx bxs-shopping-bags'></i> <span class="nav-item-text">Products</span>
                </a>
                <a href="admin-settings.html" class="nav-item active">
                    <i class='bx bxs-cog'></i> <span class="nav-item-text">Settings</span>
                </a>
                <a href="#" class="nav-item" onclick="AdminAuth.logout()">
                    <i class='bx bx-log-out'></i> <span class="nav-item-text">Logout</span>
                </a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <button class="mobile-nav-toggle" id="mobileNavToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="header-title">
                    <h1>Settings</h1>
                    <p class="admin-greeting">System configuration</p>
                </div>
            </header>

            <div class="content-section">
                <div class="card" style="margin-top: 0;">
                    <div class="card-header">
                        <h3>System Configuration</h3>
                    </div>
                    <div class="card-body">
                        <div style="text-align: center; padding: 40px 20px;">
                            <i class='bx bxs-lock-alt' style="font-size: 4rem; color: var(--primary-gold); margin-bottom: 20px;"></i>
                            <h2 style="font-family: var(--font-secondary); margin-bottom: 15px; color: var(--text-light);">Restricted Access</h2>
                            <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.6;">
                                To change your password, update system settings, or modify core store configurations, please contact your developer or support team.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="mobile-nav-menu" id="mobileNavMenu">
        <a href="admin-dashboard.html" class="nav-item"><i class='bx bxs-dashboard'></i> Dashboard</a>
        <a href="admin-categories.html" class="nav-item"><i class='bx bxs-folder'></i> Categories</a>
        <a href="admin-products.html" class="nav-item"><i class='bx bxs-shopping-bags'></i> Products</a>
        <a href="admin-settings.html" class="nav-item active"><i class='bx bxs-cog'></i> Settings</a>
        <a href="#" class="nav-item" onclick="AdminAuth.logout()"><i class='bx bx-log-out'></i> Logout</a>
    </div>

    <script type="module">
        import { AdminAuth } from './js/supabase.js';
        import { setupMobileNav } from './js/admin-nav.js';

        window.AdminAuth = AdminAuth;

        // Initialize the page
        (async () => {
            await AdminAuth.requireAuth();
            setupMobileNav();
        })();
    </script>
</body>
</html>
